<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klub Unihokeja Gepardy Białystok</title>
    <style>
        /* ==========================================
           ZMIENNE I BAZOWE USTAWIENIA
        ========================================== */
        :root {
            --black: #0a0a0a;
            --dark-card: #141414;
            --gold: #d4a02f;
            --gold-light: #f5c453;
            --white: #ffffff;
            --gray: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }

        /* ==========================================
           NAVBAR (NAGŁÓWEK)
        ========================================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, .95);
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 70px;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 70px;
            width: auto;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text span {
            font-size: 14px;
            color: var(--white);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-text h2 {
            color: var(--gold);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 10px;
        }

        nav li {
            position: relative;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: .3s ease;
        }

        nav a:hover, nav li.active a {
            color: var(--gold);
        }

        /* Aktywna linia pod linkiem głównym */
        nav li.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 24px;
            width: calc(100% - 48px);
            height: 3px;
            background: var(--gold);
        }

        /* DROPDOWN (MENU ROZWIJANE) */
        .dropdown {
            padding-bottom: 15px; 
            margin-bottom: -15px; 
        }

        .dropdown-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--white);
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .dropdown-trigger:hover {
            color: var(--gold);
        }

        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            position: absolute;
            top: calc(100% + 5px);
            right: 0;
            background: rgba(15, 15, 15, 0.98);
            min-width: 260px;
            border: 1px solid rgba(212, 160, 47, 0.4);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 10px 0;
            z-index: 1001;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            
            /* KLUCZOWA ZMIANA: Wymuszenie pionowego układu */
            display: flex;
            flex-direction: column;
        }

        .dropdown-content li {
            width: 100%;
        }

        .dropdown-content a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 25px;
            font-size: 13px;
            color: var(--white);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.25s;
        }

        /* Ikony w dropdownie */
        .dropdown-content a svg {
            width: 18px;
            height: 18px;
            fill: var(--gold);
            transition: 0.25s;
        }

        .dropdown-content a:hover {
            background: rgba(212, 160, 47, 0.1);
            color: var(--gold);
        }

        .dropdown-content a:hover svg {
            fill: var(--gold-light);
            transform: scale(1.1);
        }

        /* Wyświetlanie menu */
        .dropdown:hover .dropdown-content,
        .dropdown.active .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* ==========================================
           HERO SECTION (EFEKTOWNY BANER)
        ========================================== */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
                url('images/tlo.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/gepard_hero_bg.png') no-repeat left center;
            background-size: contain;
            opacity: 0.15;
            pointer-events: none;
        }

        .hero-container {
            text-align: center;
            max-width: 800px;
            z-index: 10;
        }

        .hero-subtitle {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--white);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hero-title {
            font-size: 76px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
            margin: 10px 0 20px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        /* Złoty separator z łapką */
        .separator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .separator-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .separator-line.right {
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .separator svg {
            width: 25px;
            height: 25px;
            fill: var(--gold);
        }

        /* Złoty, minimalistyczny przycisk */
        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 15px 35px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 14px;
            border-radius: 4px;
            transition: 0.3s ease-in-out;
        }

        .btn-outline:hover {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 0 25px rgba(212, 160, 47, 0.5);
            transform: translateY(-2px);
        }

        /* ==========================================
           KAFELKI (CARDS GRID)
        ========================================== */
        .cards-section {
            background: var(--black);
            padding: 100px 0;
        }

        .cards-container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .card-custom {
            position: relative;
            background: linear-gradient(180deg, #181818 0%, #0e0e0e 100%);
            border: 1px solid rgba(212, 160, 47, 0.25);
            border-radius: 12px;
            padding: 60px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .card-custom::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 6px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            border-radius: 10px;
            opacity: 0.7;
            transition: 0.4s;
        }

        .card-icon-wrapper {
            width: 95px;
            height: 95px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 15px rgba(212, 160, 47, 0.2);
            transition: 0.4s;
        }

        .card-icon-wrapper svg {
            width: 45px;
            height: 45px;
            fill: var(--gold);
            transition: 0.4s;
        }

        .card-custom h2 {
            font-size: 26px;
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            transition: 0.3s;
        }

        .card-link:hover .card-custom {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 
                0 0 30px rgba(212, 160, 47, 0.15),
                0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .card-link:hover .card-custom::before {
            height: 10px;
            filter: drop-shadow(0 0 8px var(--gold));
            opacity: 1;
        }

        .card-link:hover .card-icon-wrapper {
            background: var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }

        .card-link:hover .card-icon-wrapper svg {
            fill: var(--black);
        }

        .card-link:hover .card-custom h2 {
            color: var(--gold);
            letter-spacing: 3px;
        }

        /* ==========================================
           STOPKA (FOOTER)
        ========================================== */
        footer {
            background: #080808;
            padding: 60px 20px 40px;
            text-align: center;
            position: relative;
        }

        .footer-divider {
            position: relative;
            width: 80%;
            max-width: 1200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 160, 47, 0.4) 50%, transparent);
            margin: 0 auto 40px;
        }

        .footer-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 55px;
            background: #080808;
            border: 2px solid var(--gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-badge svg {
            width: 22px;
            height: 22px;
            fill: var(--gold);
        }

        footer p {
            color: var(--gray);
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .partners-footer {
            margin-top: 25px;
        }

        .partners-footer h4 {
            color: var(--gold);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .partners-footer img {
            height: 60px;
            width: auto;
            filter: grayscale(100%) brightness(150%);
            transition: 0.3s;
            cursor: pointer;
        }

        .partners-footer img:hover {
            filter: grayscale(0%) brightness(100%);
        }

        /* ==========================================
           RESPONSYWNOŚĆ (MEDIA QUERIES)
        ========================================== */
        @media (max-width: 1100px) {
            header {
                padding: 15px 30px;
            }
            .hero-title {
                font-size: 56px;
            }
            .cards-container {
                grid-template-columns: 1fr;
                gap: 25px;
                max-width: 500px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .hero-title {
                font-size: 42px;
            }
            .hero-subtitle {
                font-size: 20px;
            }
            .dropdown {
                padding-bottom: 0;
                margin-bottom: 0;
            }
            .dropdown-content {
                position: static;
                width: 100%;
                background: rgba(20, 20, 20, 0.95);
                box-shadow: none;
                border: none;
                margin-top: 10px;
                opacity: 1;
                visibility: visible;
                transform: none;
                display: none; /* Ukryte na start na mobile */
            }
            .dropdown.active .dropdown-content {
                display: flex; /* Pokazuje się jako pionowa lista po kliknięciu */
            }
            nav ul {
                flex-direction: column;
                width: 100%;
                text-align: center;
                gap: 5px;
            }
            nav a {
                padding: 10px;
                display: block;
            }
            nav li.active::after {
                display: none;
            }
        }
    </style>
</head>
<body>

                                Galeria
                            </a>
                        </li>
                        <li>
                            <a href="partnerzy.html">
                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z"/></svg>

                                Kontakt
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-container">
            <span class="hero-subtitle">Witamy w Klubie Unihokeja</span>
            <h1 class="hero-title">Gepardy</h1>
            
            <div class="separator">
                <div class="separator-line"></div>
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c-1.66 0-3 1.34-3 3 0 2 2 4 3 4s3-2 3-4c0-1.66-1.34-3-3-3zm-4.5-2c-1.1 0-2-.9-2-2s1.5-3 2-3 2 1.9 2 3-.9 2-2 2zm9 0c-1.1 0-2-.9-2-2s.9-3 2-3 2 1.9 2 3-.9 2-2 2zm-10-6C5.7 6 5 5.3 5 4.5S6.3 2 6.5 2s1.5 1.7 1.5 2.5S7.3 6 6.5 6zm11 0c-.8 0-1.5-.7-1.5-1.5S17.3 2 17.5 2s1.5 1.7 1.5 2.5S18.3 6 17.5 6z"/>
                </svg>
                <div class="separator-line right"></div>
            </div>

            <a href="https://www.facebook.com/p/Gepardy-Bia%C5%82ystok-61579192367044/" 
               class="btn-outline" 
               target="_blank" 
               rel="noopener noreferrer">
               Więcej informacji ❯
            </a>
        </div>

    <section class="cards-section">

            <a href="https://rejestr.io/krs/1192189/fundacja-gepardy-bialystok" target="_blank" rel="noopener noreferrer" class="card-link">

        </div>
        
        <p>© 2026 Gepardy Białystok Klub Unihokeja</p>

        <div class="partners-footer">

            <a href="https://www.facebook.com/wojpodlaskie" target="_blank" rel="noopener noreferrer">
                <img src="podlaskie.jpg" alt="Podlaskie Województwo">
            </a>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dropdown = document.querySelector('.dropdown');
            const trigger = document.querySelector('.dropdown-trigger');

            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
        });
    </script>

</body>
