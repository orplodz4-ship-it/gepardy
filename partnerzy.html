<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnerzy - Gepardy Białystok</title>
    <style>
        :root {
            --black: #0a0a0a;
            --dark-card: #141414;
            --gold: #d4a02f;
            --white: #ffffff;
            --gray: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--black); color: var(--white); padding-top: 140px; }

        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, .95); border-bottom: 3px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; padding: 18px 70px; z-index: 999;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 70px; }
        .logo-text h2 { color: var(--gold); font-size: 28px; text-transform: uppercase; font-weight: 900; }

        nav ul { display: flex; list-style: none; align-items: center; }
        nav a { color: var(--white); text-decoration: none; padding: 12px 24px; font-weight: 700; text-transform: uppercase; }
        nav a.back-btn { border: 1px solid rgba(212, 160, 47, .4); border-radius: 30px; color: var(--gold); }
        nav a.back-btn:hover { background: var(--gold); color: var(--black); }

        .dropdown { position: relative; }
        .dropdown-trigger { cursor: pointer; padding: 12px 24px; font-weight: 700; text-transform: uppercase; }
        .dropdown-content { display: none; position: absolute; top: 100%; right: 0; background: #141414; border: 1px solid var(--gold); list-style: none; min-width: 200px; padding: 10px 0; }
        .dropdown-content a { display: block; padding: 10px 20px; color: var(--white); text-decoration: none; text-transform: uppercase; font-size: 13px; font-weight: 600; }
        .dropdown-content a:hover { background: rgba(212, 160, 47, 0.1); color: var(--gold); }
        .dropdown:hover .dropdown-content { display: block; }

        main.partners { max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { color: var(--gold); font-size: 42px; text-transform: uppercase; margin-bottom: 10px; }
        .partners > p { color: var(--gray); font-size: 18px; margin-bottom: 40px; }

        .partners-grid { display: flex; justify-content: center; margin-top: 20px; }
        .partner-card { background: var(--dark-card); border: 1px solid rgba(212, 160, 47, 0.3); border-radius: 8px; padding: 30px; max-width: 320px; text-align: center; }
        .partner-logo img { height: 100px; width: auto; margin-bottom: 20px; }
        .partner-card h3 { font-size: 22px; margin-bottom: 5px; color: var(--white); }
        .partner-card span { display: block; color: var(--gold); font-weight: 600; margin-bottom: 20px; }
        .partner-card a { display: inline-block; color: var(--black); background: var(--gold); text-decoration: none; padding: 10px 20px; font-weight: 700; border-radius: 4px; transition: 0.3s; }
        .partner-card a:hover { background: var(--white); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Gepardy Logo">
            <div class="logo-text"><h2>Gepardy</h2></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="back-btn">← Strona Główna</a></li>
                <li class="dropdown">
                    <span class="dropdown-trigger">Więcej informacji ▼</span>
                    <ul class="dropdown-content">
                        <li><a href="o_klubie.html">O klubie</a></li>
                        <li><a href="galeria.html">Galeria</a></li>
                        <li><a href="kontakt.html">Kontakt</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="partners">
        <h1>Nasi Partnerzy</h1>
        <p>Firmy i instytucje wspierające Klub Unihokeja Gepardy Białystok.</p>
        <div class="partners-grid">
            <div class="partner-card">
                <div class="partner-logo"><img src="podlaskie.jpg" alt="Województwo Podlaskie"></div>
                <h3>Województwo Podlaskie</h3>
                <span>Sponsor Główny</span>
                <a href="https://www.facebook.com/wojpodlaskie" target="_blank" rel="noopener noreferrer">Odwiedź stronę</a>
            </div>
        </div>
    </main>

</body>
</html>
