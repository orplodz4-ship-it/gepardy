<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnerzy - Gepardy Białystok</title>
    <style>
        :root {
            --black: #0a0a0a;
            --dark-card: #141414;
            --gold: #d4a02f;
            --white: #ffffff;
            --gray: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            padding-top: 120px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, .95);
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 70px;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 70px;
        }

        .logo-text h2 {
            color: var(--gold);
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 900;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav a.back-btn {
            border: 1px solid rgba(212, 160, 47, .4);
            border-radius: 30px;
            color: var(--gold);
        }

        nav a.back-btn:hover {
            background: var(--gold);
            color: var(--black);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-trigger {
            cursor: pointer;
            padding: 12px 24px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #141414;
            border: 1px solid var(--gold);
            list-style: none;
            min-width: 200px;
            padding: 10px 0;
        }

        .dropdown-content a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 14px;
        }

        .dropdown-content svg {
            width: 18px;
            height: 18px;
            fill: var(--gold);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        main.partners {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 42px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .partners > p {
            color: var(--gray);
            font-size: 18px;
            margin-bottom: 40px;
        }

        .partners-grid {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .partner-card {
            background: var(--dark-card);
            border: 1px solid rgba(212, 160, 47, 0.3);
            border-radius: 8px;
            padding: 30px;
            max-width: 320px;
            text-align: center;
        }

        .partner-logo img {
            height: 100px;
            width: auto;
            margin-bottom: 20px;
        }

        .partner-card h3 {
            font-size: 22px;
            margin-bottom: 5px;
            color: var(--white);
        }

        .partner-card span {
            display: block;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .partner-card a {
            display: inline-block;
            color: var(--black);
            background: var(--gold);
            text-decoration: none;
            padding: 10px 20px;
            font-weight: 700;
            border-radius: 4px;
            transition: 0.3s;
        }

        .partner-card a:hover {
            background: var(--white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Gepardy Logo">
            <div class="logo-text">
                <h2>Gepardy</h2>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="back-btn">← Strona Główna</a></li>
                <li class="dropdown">
                    <span class="dropdown-trigger">Więcej informacji ▼</span>
                    <ul class="dropdown-content">
                        <li>
                            <a href="o_klubie.html">
                                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 12.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                                O klubie
                            </a>
                        </li>
                        <li>
                            <a href="galeria.html">
                                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                                Galeria
                            </a>
                        </li>
                        <li>
                            <a href="kontakt.html">
                                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                                Kontakt
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="partners">
        <h1>Nasi Partnerzy</h1>
        <p>Firmy i instytucje wspierające Klub Unihokeja Gepardy Białystok.</p>

        <div class="partners-grid">
            <div class="partner-card">
                <div class="partner-logo">
                    <img src="podlaskie.jpg" alt="Województwo Podlaskie">
                </div>
                <h3>Województwo Podlaskie</h3>
                <span>Sponsor Główny</span>
                <a href="https://www.facebook.com/wojpodlaskie" target="_blank" rel="noopener noreferrer">Odwiedź stronę</a>
            </div>
        </div>
    </main>

</body>
</html>
