<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnerzy - Gepardy Białystok</title>
    <style>
        :root {
            --black: #0a0a0a;
            --dark-card: #141414;
            --gold: #d4a02f;
            --white: #ffffff;
            --gray: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--black); color: var(--white); padding-top: 140px; }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, .95);
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 70px;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 70px;
            width: auto;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text span {
            font-size: 14px;
            color: var(--white);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-text h2 {
            color: var(--gold);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            line-height: 1;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 10px;
        }

        nav li {
            position: relative;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: .3s ease;
        }

        nav a:hover, nav li.active a {
            color: var(--white);
        }

        nav li.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 24px;
            width: calc(100% - 48px);
            height: 3px;
            background: var(--gold);
        }

        /* DROPDOWN (MENU ROZWIJANE) */
        .dropdown {
            padding-bottom: 15px;
            margin-bottom: -15px; 
        }

        .dropdown-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--white);
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .dropdown-trigger:hover {
            color: var(--gold);
        }

        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            position: absolute;
            top: calc(100% + 5px);
            right: 0;
            background: rgba(15, 15, 15, 0.98);
            min-width: 260px;
            border: 1px solid rgba(212, 160, 47, 0.4);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 10px 0;
            z-index: 1001;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
        }

        .dropdown-content li {
            width: 100%;
        }

        .dropdown-content a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 25px;
            font-size: 13px;
            color: var(--white);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.25s;
        }

        .dropdown-content a svg {
            width: 18px;
            height: 18px;
            fill: var(--gold);
            transition: 0.25s;
        }

        .dropdown-content a:hover {
            background: rgba(212, 160, 47, 0.1);
            color: var(--gold);
        }

        .dropdown-content a:hover svg {
            fill: var(--gold-light);
            transform: scale(1.1);
        }

        .dropdown:hover .dropdown-content,
        .dropdown.active .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        main.partners { max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { color: var(--gold); font-size: 42px; text-transform: uppercase; margin-bottom: 10px; }
        .partners > p { color: var(--gray); font-size: 18px; margin-bottom: 40px; }

        .partners-grid { display: flex; justify-content: center; margin-top: 20px; }
        .partner-card { background: var(--dark-card); border: 1px solid rgba(212, 160, 47, 0.3); border-radius: 8px; padding: 30px; max-width: 320px; text-align: center; }
        .partner-logo img { height: 100px; width: auto; margin-bottom: 20px; }
        .partner-card h3 { font-size: 22px; margin-bottom: 5px; color: var(--white); }
        .partner-card span { display: block; color: var(--gold); font-weight: 600; margin-bottom: 20px; }
        .partner-card a { display: inline-block; color: var(--black); background: var(--gold); text-decoration: none; padding: 10px 20px; font-weight: 700; border-radius: 4px; transition: 0.3s; }
        .partner-card a:hover { background: var(--white); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Gepardy Logo">
            <div class="logo-text"><h2>Gepardy</h2></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="back-btn">← Strona Główna</a></li>
                <li class="dropdown">
                    <span class="dropdown-trigger">Więcej informacji ▼</span>
                    <ul class="dropdown-content">
                        <li><a href="o_klubie.html">O klubie</a></li>
                        <li><a href="galeria.html">Galeria</a></li>
                        <li><a href="kontakt.html">Kontakt</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="partners">
        <h1>Nasi Partnerzy</h1>
        <p>Firmy i instytucje wspierające Klub Unihokeja Gepardy Białystok.</p>
        <div class="partners-grid">
            <div class="partner-card">
                <div class="partner-logo"><img src="podlaskie.jpg" alt="Województwo Podlaskie"></div>
                <h3>Województwo Podlaskie</h3>
                <span>Sponsor Główny</span>
                <a href="https://www.facebook.com/wojpodlaskie" target="_blank" rel="noopener noreferrer">Odwiedź stronę</a>
            </div>
        </div>
    </main>

</body>
</html>
