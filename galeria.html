<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klub Gepardy Białystok - Galeria</title>
    <style>
        /* ===========================
           ZMIENNE I RESET (Spójne z resztą strony)
        =========================== */
        :root {
            --black: #0f0f0f;
            --dark: #1b1b1b;
            --gold: #d4a02f;
            --gold-light: #f0c14b;
            --red: #8d1010;
            --white: #ffffff;
            --gray: #d8d8d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--black);
            color: var(--white);
            background-image: radial-gradient(circle at 50% 10%, #1a1a1a 0%, var(--black) 70%);
            min-height: 100vh;
        }

        /* ===========================
           NAVBAR / HEADER
        =========================== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, .95);
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 70px;
            z-index: 999;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            width: 65px;
        }

        .logo h2 {
            color: var(--gold);
            font-size: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 600;
            border: 1px solid transparent;
            border-radius: 30px;
            transition: .3s;
        }

        nav a.back-btn {
            border-color: rgba(212, 160, 47, .4);
            color: var(--gold);
        }

        nav a.back-btn:hover {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 0 15px rgba(212, 160, 47, 0.4);
        }

        /* ===========================
           GŁÓWNA SEKCJA GALERII
        =========================== */
        .gallery-section {
            width: 90%;
            max-width: 1400px;
            margin: 160px auto 80px;
            padding: 20px;
        }

        .gallery-section h1 {
            text-align: center;
            font-size: 58px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .gallery-section > p {
            text-align: center;
            color: var(--gray);
            font-size: 20px;
            margin-bottom: 70px;
        }

        /* ===========================
           KATEGORIE / WYDARZENIA
        =========================== */
        .gallery-category {
            margin-bottom: 80px;
        }

        .gallery-category h2 {
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 30px;
            text-transform: uppercase;
            border-left: 4px solid var(--gold);
            padding-left: 15px;
            letter-spacing: 1px;
        }

        /* SIATKA ZDJĘĆ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* POJEDYNCZE ZDJĘCIE (KAFELEK) */
        .gallery-item {
            position: relative;
            background: #111;
            border: 2px solid rgba(212, 160, 47, .35);
            border-radius: 18px;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            cursor: pointer;
            transition: .35s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            opacity: 0;
            transition: 0.3s;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: .5s ease;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(212, 160, 47, .25), 0 15px 30px rgba(0,0,0,0.6);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
            filter: brightness(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }

        .gallery-overlay span {
            color: var(--gold);
            font-size: 32px;
            transform: scale(0.8);
            transition: 0.3s;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-item:hover .gallery-overlay span {
            transform: scale(1);
        }

        /* ===========================
           LIGHTBOX Z GUZIKAMI I BLOKADĄ ZAZNACZANIA
        =========================== */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.96);
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 85vh;
            border: 3px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(212, 160, 47, 0.4);
            object-fit: contain;
            animation: zoomEffect 0.3s ease;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--white);
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1010;
            
            /* Zapobieganie podświetlaniu na niebiesko */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .lightbox-close:hover {
            color: var(--gold);
            transform: scale(1.1);
        }

        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--white);
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(212, 160, 47, 0.3);
            transition: 0.3s;
            z-index: 1010;

            /* Zapobieganie podświetlaniu na niebiesko przy szybkich kliknięciach */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .lightbox-arrow:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 160, 47, 0.1);
            box-shadow: 0 0 15px rgba(212, 160, 47, 0.3);
        }

        .lightbox-arrow.left { left: 30px; }
        .lightbox-arrow.right { right: 30px; }

        @keyframes zoomEffect {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ===========================
           RESPONSYWNOŚĆ
        =========================== */
        @media(max-width:768px) {
            header {
                flex-direction: column;
                padding: 15px 20px;
                gap: 15px;
            }
            .gallery-section {
                margin-top: 180px;
            }
            .gallery-section h1 {
                font-size: 42px;
            }
            .gallery-category h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 15px;
            }
            .lightbox-close {
                top: 20px;
                right: 25px;
                font-size: 35px;
            }
            .lightbox-arrow {
                font-size: 40px;
                padding: 5px 12px;
            }
            .lightbox-arrow.left { left: 10px; }
            .lightbox-arrow.right { right: 10px; }
        }

        /* ==========================================
           STYLE DLA DROPDOWN
        ========================================== */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: var(--dark); border: 1px solid var(--gold); border-radius: 8px; list-style: none; padding: 10px 0; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000; }
        .dropdown-content li a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--white); text-decoration: none; border-radius: 0; }
        .dropdown-content li a:hover { background: rgba(212, 160, 47, 0.1); color: var(--gold); }
        .dropdown-content svg { width: 20px; height: 20px; fill: var(--gold); }
        .dropdown:hover .dropdown-content, .dropdown.open .dropdown-content { display: block; }
        .dropdown-trigger { cursor: pointer; color: var(--white); font-weight: 600; padding: 12px 24px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Gepardy Logo">
            <div class="logo-text">
                <span>Klub Unihokeja</span>
                <h2>Gepardy</h2>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="back-btn">← Strona Główna</a></li>
                <li class="dropdown">
                    <span class="dropdown-trigger">Więcej informacji ▼</span>
                    <ul class="dropdown-content">
                        <li>
                            <a href="o_klubie.html">
                                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 12.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                                O klubie
                            </a>
                        </li>
                        <li>
                            <a href="partnerzy.html">
                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z"/></svg>
                                Partnerzy
                            </a>
                        </li>
                        <li>
                            <a href="kontakt.html">
                                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                                Kontakt
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="gallery-section">
        <h1>Nasza Galeria</h1>
        <p>Przeżyj jeszcze raz najważniejsze sportowe chwile i wyjazdy Gepardów Białystok.</p>
        
        <section class="gallery-category">
            <h2>Brno Open Game (25-28.06.2026)</h2>
            <div class="gallery-grid">
                <div class="gallery-item" onclick="openLightbox(0)">
                    <img src="brno/1.jpg" alt="Obóz Mazury 1" onerror="this.removeAttribute('src'); this.style.background='#1b1b1b'">
                    <div class="gallery-overlay"><span>🔍</span></div>
                </div>
                <div class="gallery-item" onclick="openLightbox(1)">
                    <img src="brno/2.jpg" alt="Obóz Mazury 2" onerror="this.removeAttribute('src'); this.style.background='#1b1b1b'">
                    <div class="gallery-overlay"><span>🔍</span></div>
                </div>
                <div class="gallery-item" onclick="openLightbox(2)">
                    <img src="brno/3.jpg" alt="Obóz Mazury 3" onerror="this.removeAttribute('src'); this.style.background='#1b1b1b'">
                    <div class="gallery-overlay"><span>🔍</span></div>
                </div>
                <div class="gallery-item" onclick="openLightbox(3)">
                    <img src="brno/4.jpg" alt="Obóz Mazury 4" onerror="this.removeAttribute('src'); this.style.background='#1b1b1b'">
                    <div class="gallery-overlay"><span>🔍</span></div>
                </div>
                <div class="gallery-item" onclick="openLightbox(4)">
                    <img src="brno/5.jpg" alt="Obóz Mazury 5" onerror="this.removeAttribute('src'); this.style.background='#1b1b1b'">
                    <div class="gallery-overlay"><span>🔍</span></div>
                </div>
            </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightboxForce()">&times;</span>
        <span class="lightbox-arrow left" onclick="prevImage(event)">&#8249;</span>
        <img id="lightbox-img" class="lightbox-content" src="" alt="Powiększenie">
        <span class="lightbox-arrow right" onclick="nextImage(event)">&#8250;</span>
    </div>

    <script>
        // Automatyczne zebranie adresów URL wszystkich zdjęć znajdujących się w siatce galerii
        const images = Array.from(document.querySelectorAll('.gallery-grid .gallery-item img')).map(img => img.getAttribute('src'));
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Zablokowanie przewijania strony w tle
        }

        function updateLightboxImage() {
            document.getElementById('lightbox-img').src = images[currentIndex];
        }

        function closeLightboxForce() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto'; // Przywrócenie przewijania strony
        }

        function closeLightbox(event) {
            // Zamknij okno tylko, jeśli kliknięcie nastąpiło bezpośrednio na ciemne tło
            if (event.target.id === 'lightbox') {
                closeLightboxForce();
            }
        }

        function prevImage(event) {
            if (event) event.stopPropagation(); // Zapobieganie zamknięciu okna przy kliknięciu w strzałkę
            currentIndex = (currentIndex === 0) ? images.length - 1 : currentIndex - 1;
            updateLightboxImage();
        }

        function nextImage(event) {
            if (event) event.stopPropagation(); // Zapobieganie zamknięciu okna przy kliknięciu w strzałkę
            currentIndex = (currentIndex === images.length - 1) ? 0 : currentIndex + 1;
            updateLightboxImage();
        }

        // Integracja z klawiaturą (Esc, Strzałka w lewo, Strzałka w prawo)
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
                if (e.key === 'Escape') closeLightboxForce();
            }
        });
    </script>

</body>
</html>
